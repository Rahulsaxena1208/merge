<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient for warmth -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
    
    <!-- Shelf Gradient -->
    <linearGradient id="shelfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B5A2B" />
      <stop offset="100%" stop-color="#5C3A18" />
    </linearGradient>
    
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="400" rx="20" fill="url(#bgGrad)" />

  <!-- Bookshelf Background Details -->
  <rect x="50" y="50" width="400" height="300" fill="#cbd5e1" rx="10" />

  <!-- Top Shelf -->
  <rect x="40" y="140" width="420" height="15" fill="url(#shelfGrad)" rx="5" filter="url(#shadow)" />
  
  <!-- Middle Shelf -->
  <rect x="40" y="240" width="420" height="15" fill="url(#shelfGrad)" rx="5" filter="url(#shadow)" />
  
  <!-- Bottom Shelf -->
  <rect x="40" y="340" width="420" height="15" fill="url(#shelfGrad)" rx="5" filter="url(#shadow)" />

  <!-- Middle Shelf Layer of Books (Row 2) -->
  <!-- Blue Book -->
  <rect x="70" y="160" width="30" height="80" fill="#3b82f6" rx="3" />
  <rect x="75" y="170" width="20" height="10" fill="#fff" opacity="0.3" />
  
  <!-- Red Book -->
  <rect x="105" y="150" width="35" height="90" fill="#ef4444" rx="3" />
  <line x1="110" y1="165" x2="135" y2="165" stroke="#fff" stroke-width="2" opacity="0.5"/>
  <line x1="110" y1="225" x2="135" y2="225" stroke="#fff" stroke-width="2" opacity="0.5"/>

  <!-- Green Book -->
  <rect x="145" y="165" width="25" height="75" fill="#10b981" rx="3" />
  
  <!-- Leaning Orange Book -->
  <g transform="translate(180, 160) rotate(15)">
    <rect x="0" y="0" width="25" height="80" fill="#f59e0b" rx="2" />
  </g>

  <!-- Yellow Book -->
  <rect x="230" y="155" width="40" height="85" fill="#facc15" rx="4" />
  <circle cx="250" cy="195" r="8" fill="#fff" opacity="0.4" />

  <!-- Purple Book -->
  <rect x="350" y="160" width="30" height="80" fill="#8b5cf6" rx="3" />
  <rect x="382" y="150" width="25" height="90" fill="#c026d3" rx="3" />
  <line x1="387" y1="170" x2="400" y2="170" stroke="#fff" stroke-width="2" opacity="0.5"/>
  
  <!-- Highlight / Action Indicator (Empty spot / placing book) -->
  <g transform="translate(290, 70)">
    <!-- Book being lowered down -->
    <rect x="0" y="0" width="35" height="85" fill="#0ea5e9" rx="4" filter="url(#shadow)" />
    <path d="M 5,10 L 30,10 M 10,20 L 25,20" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Animated Down Arrow (using static representation here for simplicity, animation in CSS maybe but pure SVG works) -->
    <path d="M 17,95 L 17,135 M 5,123 L 17,135 L 29,123" fill="none" stroke="#0ea5e9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="17" cy="145" r="20" fill="#0ea5e9" opacity="0.2">
      <animate attributeName="r" values="10; 25; 10" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5; 0; 0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Text / Title -->
  <text x="250" y="40" font-family="sans-serif" font-size="22" font-weight="bold" fill="#334155" text-anchor="middle">Please place the book on the shelf</text>
</svg>

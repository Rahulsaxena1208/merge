<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <defs>
    <!-- Reader pad gradient -->
    <linearGradient id="padGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1e3a5f" flood-opacity="0.18"/>
    </filter>
    <filter id="padShadow" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e40af" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- RFID Reader Pad -->
  <g filter="url(#padShadow)">
    <rect x="100" y="220" width="200" height="100" rx="16" fill="url(#padGrad)"/>
    <!-- Contactless icon on pad -->
    <g transform="translate(200, 265)" stroke="#93c5fd" fill="none" stroke-width="2.5" stroke-linecap="round">
      <circle cx="0" cy="0" r="6" fill="#93c5fd"/>
      <path d="M -12,-12 A 17 17 0 0 1 12,-12" opacity="0.6"/>
      <path d="M -18,-18 A 25.5 25.5 0 0 1 18,-18" opacity="0.4"/>
      <path d="M -24,-24 A 34 34 0 0 1 24,-24" opacity="0.25"/>
    </g>
    <!-- Pad label -->
    <text x="200" y="305" font-family="system-ui, sans-serif" font-size="11" fill="#bfdbfe" text-anchor="middle" font-weight="500">TAP HERE</text>
  </g>

  <!-- Signal waves (animated) -->
  <g transform="translate(200, 195)">
    <circle cx="0" cy="0" r="20" fill="#3b82f6" opacity="0.12">
      <animate attributeName="r" values="20;50;20" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0;0.2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="15" fill="#3b82f6" opacity="0.15">
      <animate attributeName="r" values="15;40;15" dur="2s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0;0.25" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Library Card (hovering, with subtle float animation) -->
  <g filter="url(#cardShadow)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="3s" repeatCount="indefinite"/>
      <!-- Card body -->
      <rect x="110" y="40" width="180" height="115" rx="12" fill="url(#cardGrad)" stroke="#cbd5e1" stroke-width="1"/>
      <!-- Blue header stripe -->
      <rect x="110" y="40" width="180" height="35" rx="12" fill="#2563eb"/>
      <rect x="110" y="60" width="180" height="15" fill="#2563eb"/>
      <!-- Header text -->
      <text x="200" y="62" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="700" letter-spacing="1">LIBRARY CARD</text>
      <!-- Photo placeholder -->
      <rect x="125" y="85" width="35" height="42" rx="4" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="0.5"/>
      <circle cx="142" cy="98" r="8" fill="#94a3b8"/>
      <ellipse cx="142" cy="118" rx="12" ry="7" fill="#94a3b8"/>
      <!-- Name lines -->
      <rect x="170" y="90" width="95" height="8" rx="3" fill="#94a3b8" opacity="0.5"/>
      <rect x="170" y="105" width="70" height="6" rx="3" fill="#cbd5e1" opacity="0.6"/>
      <!-- Barcode -->
      <g transform="translate(170, 120)">
        <rect x="0" y="0" width="3" height="14" fill="#334155"/>
        <rect x="5" y="0" width="2" height="14" fill="#334155"/>
        <rect x="9" y="0" width="4" height="14" fill="#334155"/>
        <rect x="15" y="0" width="2" height="14" fill="#334155"/>
        <rect x="19" y="0" width="3" height="14" fill="#334155"/>
        <rect x="24" y="0" width="2" height="14" fill="#334155"/>
        <rect x="28" y="0" width="4" height="14" fill="#334155"/>
        <rect x="34" y="0" width="2" height="14" fill="#334155"/>
        <rect x="38" y="0" width="3" height="14" fill="#334155"/>
        <rect x="43" y="0" width="2" height="14" fill="#334155"/>
        <rect x="47" y="0" width="4" height="14" fill="#334155"/>
        <rect x="53" y="0" width="2" height="14" fill="#334155"/>
        <rect x="57" y="0" width="3" height="14" fill="#334155"/>
        <rect x="62" y="0" width="4" height="14" fill="#334155"/>
        <rect x="68" y="0" width="2" height="14" fill="#334155"/>
      </g>
      <!-- Chip -->
      <rect x="128" y="90" width="28" height="20" rx="3" fill="#facc15" opacity="0.6"/>
      <line x1="132" y1="95" x2="152" y2="95" stroke="#eab308" stroke-width="0.7"/>
      <line x1="132" y1="100" x2="152" y2="100" stroke="#eab308" stroke-width="0.7"/>
      <line x1="132" y1="105" x2="152" y2="105" stroke="#eab308" stroke-width="0.7"/>
    </g>
  </g>

  <!-- Down arrow indicator -->
  <g transform="translate(200, 175)" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" values="200,170; 200,180; 200,170" dur="1.5s" repeatCount="indefinite"/>
    <path d="M -8,-5 L 0,5 L 8,-5" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
